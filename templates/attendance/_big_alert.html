<div style="background:#fff;border-radius:24px;padding:60px 40px;text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,.5);border-bottom:20px solid {{ color }};width:90%;max-width:600px">
  <div style="font-size:100px;line-height:1;margin-bottom:20px">{{ icon }}</div>
  <h2 style="margin:0 0 10px;font-size:2.5rem;color:#333">{{ just_marked.name }}</h2>
  <p style="margin:0;font-size:1.5rem;color:#666">C.I: {{ just_marked.id_card }}</p>
  <div style="font-size:4.5rem;font-weight:900;margin-top:25px;color:{{ color }};text-transform:uppercase;letter-spacing:4px">
    {{ just_marked.status_display }}
  </div>
</div>
