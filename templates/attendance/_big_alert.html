<div style="background:#fff;border-radius:24px;padding:52px 40px;text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,.5);border-bottom:20px solid {{ color }};width:90%;max-width:600px">
  <div style="font-size:92px;line-height:1;margin-bottom:16px">{{ icon }}</div>
  <h2 style="margin:0 0 8px;font-size:2.4rem;color:#333">{{ just_marked.name }}</h2>
  <p style="margin:0;font-size:1.4rem;color:#666">C.I: {{ just_marked.id_card }}</p>
  <div style="font-size:4.2rem;font-weight:900;margin-top:20px;color:{{ color }};text-transform:uppercase;letter-spacing:4px">
    {{ just_marked.status_display }}
  </div>
  <div style="margin-top:26px;display:flex;gap:40px;justify-content:center;flex-wrap:wrap;border-top:1px solid #eee;padding-top:22px">
    <div style="text-align:center">
      <div style="font-size:12px;letter-spacing:1.5px;color:#999;text-transform:uppercase;font-weight:700">Plan</div>
      <div style="font-size:1.2rem;font-weight:700;color:#333;margin-top:4px">{{ just_marked.plan }}</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:12px;letter-spacing:1.5px;color:#999;text-transform:uppercase;font-weight:700">Instructor</div>
      <div style="font-size:1.2rem;font-weight:700;color:#333;margin-top:4px">{{ just_marked.trainer }}</div>
    </div>
  </div>
</div>
